services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nike_clone
      POSTGRES_USER: nike
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nike_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nike -d nike_clone']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: nike_clone.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      DATABASE_URL: postgres://nike:${POSTGRES_PASSWORD:-nike_secret}@db:5432/nike_clone
      SEED_PRODUCTS: ${SEED_PRODUCTS:-true}
      SECURE_SSL_REDIRECT: 'false'
      SESSION_COOKIE_SECURE: 'false'
      CSRF_COOKIE_SECURE: 'false'
    expose:
      - '8000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${PORT:-80}:80'

volumes:
  postgres_data:
